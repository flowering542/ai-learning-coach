version: '3.8'

services:
  ai-learning-coach:
    build: .
    container_name: ai-learning-coach
    ports:
      - "3000:3000"
    environment:
      - COACH_PORT=3000
      - COACH_ADMIN_QQ_IDS=${COACH_ADMIN_QQ_IDS}
      - COACH_DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 可选：使用 Nginx 作为反向代理
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
